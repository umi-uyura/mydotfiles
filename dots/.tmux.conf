#
# my .tmux.conf
#

# Change prefix key C-t
# set-option -g prefix C-t
# unbind-key C-b
# bind-key C-t send-prefix

# tmux内ではステータスバーにディレクトリ名を表示（外側のタイトルはシェル側のPROMPT_COMMANDに任せる）
set -g set-titles off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Enable mouse control
set-option -g mouse on

# Color setting
set-option -g default-terminal "screen-256color"
# set-option -g default-terminal "tmux-256color"
set -g terminal-overrides "xterm:colors=256"

# Extended keys support (for Shift+Enter in Claude Code, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Status line
set-option -g status-bg "colour026"
set-option -g status-fg "colour255"
set-option -g status-right "%H:%M %Y-%m-%d"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Open new window in current directory
bind c new-window -c "#{pane_current_path}"

